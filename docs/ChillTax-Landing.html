document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

size:clamp(19px,2.5vw,24px);font-weight:800;letter-spacing:-.01em;margin:0 0 18px;color:#6a2300\">เห็นแล้วใช่ไหม ว่าไม่ต้องเก่งบัญชีเลย<\u002Fp>\n    <a href=\"#line\" style=\"display:inline-flex;align-items:center;gap:9px;padding:16px 34px;border-radius:100px;background:linear-gradient(135deg,#e0943d,#a85808);color:#fff;font-weight:700;font-size:17px;text-decoration:none;box-shadow:0 6px 22px rgba(224,148,61,.40)\">ให้ Chilly ช่วยเลย<\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section style=\"background:#fffdfa;border-top:1px solid #e6d6c8\">\n  <div style=\"max-width:1120px;margin:0 auto;padding:clamp(56px,8vw,96px) 24px\">\n    <h2 style=\"text-align:center;font-size:clamp(27px,3.6vw,42px);font-weight:800;letter-spacing:-.02em;margin:0 0 14px\">ภาษีฟรีแลนซ์ &amp; อินฟลูเอนเซอร์ ทำไมถึงปวดหัว?<\u002Fh2>\n    <p style=\"text-align:center;color:#a75f29;font-size:17px;margin:0 0 clamp(34px,4vw,52px);max-width:560px;margin-left:auto;margin-right:auto\">ถ้าคุณเคยรู้สึกแบบนี้ คุณไม่ได้เป็นคนเดียว<\u002Fp>\n    <div class=\"ct-g3\">\n      <div style=\"background:#f4efea;border:1px solid #e6d6c8;border-radius:24px;padding:30px\"><div style=\"font-size:30px;margin-bottom:14px\">🤷<\u002Fdiv><h3 style=\"font-size:19px;font-weight:700;margin:0 0 9px\">ไม่รู้ต้องจ่ายภาษีเท่าไหร่<\u002Fh3><p style=\"color:#997550;font-size:15px;line-height:1.6;margin:0\">รายได้ไม่สม่ำเสมอ คำนวณเองไม่เป็น จะกันเงินไว้เท่าไหร่ก็ไม่รู้ ได้แต่ลุ้นตอนสิ้นปี<\u002Fp><\u002Fdiv>\n      <div style=\"background:#f4efea;border:1px solid #e6d6c8;border-radius:24px;padding:30px\"><div style=\"font-size:30px;margin-bottom:14px\">😰<\u002Fdiv><h3 style=\"font-size:19px;font-weight:700;margin:0 0 9px\">กลัวโดนเรียกเก็บย้อนหลัง<\u002Fh3><p style=\"color:#997550;font-size:15px;line-height:1.6;margin:0\">ได้ยินเรื่องเบี้ยปรับเงินเพิ่มแล้วใจหวิว ไม่อยากเจอจดหมายจากสรรพากรทีหลัง<\u002Fp><\u002Fdiv>\n      <div style=\"background:#f4efea;border:1px solid #e6d6c8;border-radius:24px;padding:30px\"><div style=\"font-size:30px;margin-bottom:14px\">🧾<\u002Fdiv><h3 style=\"font-size:19px;font-weight:700;margin:0 0 9px\">ไม่รู้หักค่าใช้จ่ายอะไรได้<\u002Fh3><p style=\"color:#997550;font-size:15px;line-height:1.6;margin:0\">กล้อง ไมค์ ค่าเน็ต ค่าซับสคริปชัน—อันไหนเอามาหักได้บ้าง? ไม่หักก็เสียภาษีเกินจริง<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"features\" style=\"max-width:1120px;margin:0 auto;padding:clamp(56px,8vw,96px) 24px\">\n  <h2 style=\"text-align:center;font-size:clamp(27px,3.6vw,42px);font-weight:800;letter-spacing:-.02em;margin:0 0 14px\">ChillTax ทำให้ภาษีเป็นเรื่องชิล<\u002Fh2>\n  <p style=\"text-align:center;color:#a75f29;font-size:17px;margin:0 0 clamp(34px,4vw,52px);max-width:560px;margin-left:auto;margin-right:auto\">ออกแบบมาเพื่อคนรายได้หลายทางโดยเฉพาะ<\u002Fp>\n  <div class=\"ct-g3\" style=\"margin-bottom:30px\">\n    <div style=\"background:#fffdfa;border:1px solid #e6d6c8;border-radius:24px;padding:32px;transition:transform .25s,box-shadow .25s\" style-hover=\"transform:translateY(-7px);box-shadow:0 22px 44px rgba(106,35,0,.13)\"><div style=\"width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,#f4e6d6,#f0d8c0);display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:18px\">💬<\u002Fdiv><h3 style=\"font-size:21px;font-weight:800;margin:0 0 10px\">ง่ายจนไม่รู้สึกว่าทำบัญชี<\u002Fh3><p style=\"color:#997550;font-size:15px;line-height:1.65;margin:0\">แค่พิมพ์ในไลน์เหมือนคุยกับเพื่อน ไม่มีฟอร์มยาว ไม่มีศัพท์บัญชี<\u002Fp><\u002Fdiv>\n    <div style=\"background:#fffdfa;border:1px solid #e6d6c8;border-radius:24px;padding:32px;transition:transform .25s,box-shadow .25s\" style-hover=\"transform:translateY(-7px);box-shadow:0 22px 44px rgba(106,35,0,.13)\"><div style=\"width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,#f4e6d6,#f0d8c0);display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:18px\">🧩<\u002Fdiv><h3 style=\"font-s 02Fspan>\n        <\u002Fbutton>\n        <sc-if value=\"{{ item.open }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:0 22px 22px;color:#997550;font-size:15px;line-height:1.65\">{{ item.a }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section style=\"background:linear-gradient(140deg,#6a2300,#a75f29);position:relative;overflow:hidden\">\n  <div style=\"position:absolute;top:-60px;right:-40px;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle,rgba(224,148,61,.4),transparent 65%);filter:blur(40px)\"><\u002Fdiv>\n  <div style=\"max-width:1120px;margin:0 auto;padding:clamp(60px,9vw,110px) 24px;position:relative;text-align:center\">\n    <h2 style=\"font-size:clamp(30px,4.6vw,52px);font-weight:800;letter-spacing:-.03em;color:#fff;margin:0 0 16px;line-height:1.12\">ภาษีเรื่องชิล แค่พิมพ์ในไลน์<\u002Fh2>\n    <p style=\"color:rgba(255,255,255,.86);font-size:18px;margin:0 0 32px;max-width:520px;margin-left:auto;margin-right:auto\">เริ่มบันทึกรายได้แรกของคุณวันนี้ ฟรี ไม่ต้องผูกบัตร ใช้เวลาไม่ถึงนาที<\u002Fp>\n    <a href=\"#line\" style=\"display:inline-flex;align-items:center;gap:10px;padding:18px 38px;border-radius:100px;background:linear-gradient(135deg,#e0943d,#a85808);color:#fff;font-weight:800;font-size:18px;text-decoration:none;box-shadow:0 10px 34px rgba(224,148,61,.55)\">Add LINE OA ฟรี<\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer style=\"background:#3d1400;color:rgba(255,255,255,.62)\">\n  <div style=\"max-width:1120px;margin:0 auto;padding:48px 24px 40px\">\n    <div style=\"display:flex;flex-wrap:wrap;gap:24px;align-items:center;justify-content:space-between;margin-bottom:28px\">\n      <a href=\"#\" style=\"display:flex;align-items:center;gap:9px;text-decoration:none\">\n        <span style=\"width:22px;height:22px;border-radius:3px 100% 3px 100%;background:linear-gradient(135deg,#e0943d,#a85808);display:inline-block;transform:rotate(-8deg)\"><\u002Fspan>\n        <span style=\"font-weight:800;font-size:19px;color:#fff\">ChillTax<\u002Fspan>\n      <\u002Fa>\n      <div style=\"display:flex;flex-wrap:wrap;gap:22px;font-size:14.5px\">\n        <a href=\"#features\" style=\"color:rgba(255,255,255,.72);text-decoration:none\">ฟีเจอร์<\u002Fa>\n        <a href=\"#pricing\" style=\"color:rgba(255,255,255,.72);text-decoration:none\">ราคา<\u002Fa>\n        <a href=\"#\" style=\"color:rgba(255,255,255,.72);text-decoration:none\">บทความ<\u002Fa>\n        <a href=\"#\" style=\"color:rgba(255,255,255,.72);text-decoration:none\">นโยบายความเป็นส่วนตัว (PDPA)<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:13px;line-height:1.7;margin:0 0 14px;max-width:760px\">ChillTax เป็นผู้ช่วยภาษีในแชต ช่วยประเมินและเตรียมภาษีให้ง่ายขึ้น <b style=\"color:rgba(255,255,255,.8)\">ไม่ใช่คำแนะนำทางกฎหมายหรือการบัญชี<\u002Fb> กรณีที่ซับซ้อนแนะนำให้ปรึกษานักบัญชีหรือผู้เชี่ยวชาญด้านภาษี<\u002Fp>\n    <p style=\"font-size:13px;margin:0;color:rgba(255,255,255,.45)\">© 2026 ChillTax · ข้อมูลของคุณเก็บตามมาตรฐาน PDPA<\u002Fp>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<div class=\"ct-sticky-cta\" style=\"position:fixed;left:0;right:0;bottom:0;z-index:70;padding:12px 16px;background:rgba(244,239,234,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid #e6d6c8\">\n  <a href=\"#line\" style=\"display:flex;align-items:center;justify-content:center;gap:8px;padding:15px;border-radius:100px;background:linear-gradient(135deg,#e0943d,#a85808);color:#fff;font-weight:800;font-size:16.5px;text-decoration:none;box-shadow:0 6px 22px rgba(224,148,61,.40)\">เริ่มฟรีบน LINE<\u002Fa>\n<\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1120,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { menuOpen: false, openFaq: 0 };\n  renderVals() {\n    const data = [\n      { q: 'รายได้เท่าไหร่ถึงต้องยื่นภาษี?', a: 'ถ้าคุณมีเงินได้จากงานอิสระหรือขายของเกินปีละ 60,000 บาท (คนโสด) หรือ 120,000 บาท (สมรส) ก็เข้าเกณฑ์ต้องยื่นแล้ว และบางกรณีอาจต้องยื่นกลางปี (ภ.ง.ด.94) ด้วย — ไม่ต้องจำเอง Chilly จะคอยเตือนให้เมื่อใกล้ถึงเกณฑ์' },\n      { q: 'ฟรีแลนซ์หักค่าใช้จ่ายอะไรได้บ้าง?', a: 'ขึ้นอยู่กับประเภทเงินได้ของคุณ งานรับจ้าง/ฟรีแลนซ์ (40(2)) มักหักแบบเหมา 50% (สูงสุด 100,000 บาท) ส่วนงานที่ลงทุนเอง เช่น ขายของหรือผลิตคอนเทนต์ (40(8)) อาจหักตามจริงได้ทั้งค่ากล้อง อุปกรณ์ ค่าเน็ต ค่าเดินทาง — Chilly จะช่วยดูให้ว่าแบบไหนคุ้มกว่า' },\n      { q: 'เหมาจ่าย กับ หักตามจริง เลือกแบบไหนคุ้มกว่า?', a: 'เหมาจ่ายคือหักเป็นเปอร์เซ็นต์ตายตัวโดยไม่ต้องมีหลักฐาน ส่วนหักตามจริงคือหักตามค่าใช้จ่ายที่เกิดขึ้นจริง (ต้องมีใบเสร็จ) ถ้าค่าใช้จ่ายจริงสูงกว่าเหมาก็หักตามจริงคุ้มกว่า ChillTax จะคำนวณทั้งสองแบบเทียบให้เห็นว่าวิธีไหนเสียภาษีน้อยกว่า' },\n      { q: 'ถูกหัก ณ ที่จ่าย 3% เอาคืนได้ไหม?', a: 'ได้ครับ เงินที่ถูกหัก ณ ที่จ่าย 3% ไม่ได้หายไป แต่เป็นภาษีที่จ่ายล่วงหน้าแทนคุณ พอยื่นภาษีจริง ยอดนี้จะถูกนำมาหักออกจากภาษีที่ต้องจ่าย ถ้าจ่ายเกินก็ได้คืน — ChillTax รวมยอดหัก ณ ที่จ่ายจากใบ 50 ทวิ ให้อัตโนมัติ' },\n      { q: 'ใบ 50 ทวิ ต้องจัดการยังไง?', a: 'ทุกครั้งที่ถูกหัก ณ ที่จ่าย คุณจะได้ใบ 50 ทวิ แค่พิมพ์บอก Chilly หรือเก็บภาพไว้ ระบบจะรวมยอดหัก ณ ที่จ่ายให้อัตโนมัติ พอถึงเวลายื่นก็เอาไปลดภาษีที่ต้องจ่ายได้เลย ไม่ต้องนั่งรวมเอง' },\n      { q: 'ต้องยื่นภาษีกลางปี (ภ.ง.ด.94) ด้วยไหม?', a: 'ถ้าคุณมีเงินได้ประเภท 40(5)–(8) เช่น ขายของหรือรับงานทั่วไป ถึงเกณฑ์ ก็ต้องยื่น ภ.ง.ด.94 ช่วงครึ่งปีด้วย ChillTax จะประเมินให้และเตือนล่วงหน้าก่อนถึงกำหนด คุณจะได้ไม่พลาด' },\n      { q: 'ต้องเชื่อมบัญชีธนาคารหรือผูกบัตรไหม?', a: 'ไม่ต้องเลย ChillTax ทำงานบนแชต LINE คุณแค่พิมพ์บอกรายได้เอง ไม่ต้องเชื่อมบัญชีธนาคารหรือผูกบัตรเครดิต เริ่มใช้แพลน Free ได้ทันที' },\n      { q: 'ChillTax รองรับรายได้แบบไหนบ้าง?', a: 'รองรับรายได้หลายทางของคนทำงานอิสระ เช่น ค่ารีวิว/สปอนเซอร์ งานฟรีแลนซ์ ขายของออนไลน์ ค่าคอมมิชชั่น และงานรับจ้างทั่วไป Chilly จะช่วยแยกให้ว่าแต่ละรายการเข้าเงินได้มาตรา 40 ข้อไหน' },\n      { q: 'ต่างจากการยื่นเองหรือจ้างนักบัญชียังไง?', a: 'ChillTax เป็นผู้ช่วยภาษีในแชต ไม่ใช่โปรแกรมบัญชีและไม่ได้มาแทนนักบัญชี แต่ช่วยบันทึกและประเมินภาษีให้ตลอดทั้งปี ทำให้ตอนยื่นง่ายขึ้นมาก กรณีที่ซับซ้อนเราแนะนำให้ปรึกษาผู้เชี่ยวชาญ' },\n      { q: 'ฟรีจริงไหม แล้วข้อมูลปลอดภัยไหม?', a: 'แพลน Free ใช้ได้จริง ไม่มีหมดอายุ เหมาะกับคนเริ่มต้น ส่วนข้อมูลของคุณถูกเข้ารหัสและเก็บตามมาตรฐาน PDPA เราไม่ขายข้อมูล และคุณขอลบข้อมูลได้ทุกเมื่อ' },\n    ];\n    const faqs = data.map((f, i) => ({\n      q: f.q,\n      a: f.a,\n      open: this.state.openFaq === i,\n      iconStyle: 'flex:none;font-size:24px;font-weight:400;color:#e0943d;line-height:1;transition:transform .25s;transform:' + (this.state.openFaq === i ? 'rotate(45deg)' : 'rotate(0deg)'),\n      toggle: () => this.setState(s => ({ openFaq: s.openFaq === i ? -1 : i })),\n    }));\n    return {\n      menuOpen: this.state.menuOpen,\n      toggleMenu: () => this.setState(s => ({ menuOpen: !s.menuOpen })),\n      closeMenu: () => this.setState({ menuOpen: false }),\n      faqs,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
